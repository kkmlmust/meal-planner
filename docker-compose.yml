services:
  qwen-code-api:
    build:
      context: ../se-toolkit-lab-8/qwen-code-api
      dockerfile: Dockerfile
      args:
        REGISTRY_PREFIX_DOCKER_HUB: ""
    container_name: qwen-code-api
    volumes:
      - ~/.qwen:/mnt/qwen-creds:ro
    environment:
      - PORT=8080
      - ADDRESS=0.0.0.0
      - LOG_LEVEL=error
      - MAX_RETRIES=5
      - RETRY_DELAY_MS=1000
      - QWEN_CODE_AUTH_USE=true
      - QWEN_CODE_API_KEY=${QWEN_CODE_API_KEY:-sk-qwen-local}
      - DEFAULT_MODEL=coder-model
      - LOG_REQUESTS=true
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - recipe-network

  postgres:
    image: postgres:18-alpine
    container_name: recipe-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recipe_db}
      POSTGRES_USER: ${POSTGRES_USER:-recipe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipe_user} -d ${POSTGRES_DB:-recipe_db}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - recipe-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipe-backend
    environment:
      RECIPE_API_KEY: ${RECIPE_API_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recipe_db}
      POSTGRES_USER: ${POSTGRES_USER:-recipe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - recipe-network

  recipe-agent:
    build:
      context: ./recipe-agent
      dockerfile: Dockerfile
    container_name: recipe-agent
    environment:
      RECIPE_AGENT_LLM_BASE_URL: http://qwen-code-api:8080/v1
      RECIPE_AGENT_LLM_API_KEY: ${QWEN_CODE_API_KEY:-sk-qwen-local}
      RECIPE_AGENT_LLM_MODEL: ${RECIPE_AGENT_LLM_MODEL:-coder-model}
      RECIPE_AGENT_ACCESS_KEY: ${RECIPE_AGENT_ACCESS_KEY:-local-agent-key}
      RECIPE_AGENT_BACKEND_URL: http://backend:8000
      RECIPE_API_KEY: ${RECIPE_API_KEY}
      DEFAULT_TELEGRAM_ID: ${DEFAULT_TELEGRAM_ID:-test_user_1}
      PYTHONUNBUFFERED: "1"
    ports:
      - "8765:8765"
    depends_on:
      backend:
        condition: service_healthy
      qwen-code-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 8765)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - recipe-network

  client-telegram-bot:
    build:
      context: ./client-telegram-bot
      dockerfile: Dockerfile
    container_name: recipe-telegram-bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      NANOBOT_WS_URL: ws://recipe-agent:8765/ws/chat
      NANOBOT_ACCESS_KEY: ${RECIPE_AGENT_ACCESS_KEY:-local-agent-key}
    depends_on:
      recipe-agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - recipe-network

networks:
  recipe-network:
    driver: bridge

volumes:
  postgres_data:
